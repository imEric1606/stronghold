<style>
body {
 margin: 0;
 background: #0d1117;
 font-family: Arial, sans-serif;
 color: white;
 display: flex;
 height: 100vh;
 overflow: hidden;
}

#otpScreen {
 display: flex;
 width: 100%;
 height: 100vh;
 background: #0d1117;
 align-items: center;
 justify-content: center;
 position: absolute;
 z-index: 100;
 top: 0;
 left: 0;
}

.otp-box {
 max-width: 400px;
 width: 100%;
 background: #151b2d;
 border: 1px solid #253457;
 border-radius: 14px;
 padding: 30px;
 text-align: center;
}

.otp-box h2 { margin-top: 0; color: #9bd7ff; }

.otp-input, .modal-input {
 width: 100%;
 box-sizing: border-box;
 padding: 12px;
 margin: 15px 0;
 border-radius: 8px;
 border: 1px solid #253457;
 background: #1e1e1e;
 color: white;
 font-size: 16px;
 text-align: center;
}

.otp-btn, .modal-btn {
 width: 100%;
 padding: 12px;
 font-size: 16px;
 border-radius: 8px;
 border: none;
 cursor: pointer;
 font-weight: bold;
 background: #4b6fc9;
 color: white;
 transition: all 0.2s ease;
 margin-bottom: 10px;
}

.otp-btn:hover, .modal-btn:hover { background: #6d8df0; }

.text-btn {
 background: none; border: none; color: #9bd7ff;
 cursor: pointer; font-size: 14px; text-decoration: underline;
}
.text-btn:hover { color: #fff; }

#vaultApp {
 display: none;
 width: 100%;
 height: 100vh;
}

/* --- BAN SCREEN STYLES --- */
#bannedScreen {
 display: none;
 width: 100%;
 height: 100vh;
 background: black;
 color: #ff3333;
 align-items: center;
 justify-content: center;
 font-size: 100px;
 font-weight: 900;
 text-transform: uppercase;
 text-align: center;
 position: absolute;
 z-index: 300;
 top: 0;
 left: 0;
}

/* --- MODAL STYLES --- */
.modal-overlay {
 display: none;
 position: fixed;
 top: 0; left: 0; width: 100%; height: 100%;
 background: rgba(0,0,0,0.8);
 z-index: 400;
 align-items: center;
 justify-content: center;
}
.modal-content {
 background: #151b2d;
 border: 1px solid #253457;
 border-radius: 14px;
 padding: 30px;
 max-width: 400px;
 width: 100%;
 text-align: center;
 position: relative;
}
.close-btn {
 position: absolute;
 top: 10px; right: 15px;
 color: #ff4d4d;
 cursor: pointer;
 font-size: 20px;
 font-weight: bold;
}

.left-sidebar {
 width: 280px;
 background: #151b2d;
 border-right: 2px solid #253457;
 padding: 20px;
 display: flex;
 flex-direction: column;
 gap: 12px;
 box-shadow: 4px 0 12px rgba(0,0,0,0.25);
 overflow-y: auto;
 z-index: 10;
}

.center-column {
 flex: 1;
 display: flex;
 flex-direction: column;
 background: #0d1117;
 padding: 20px;
 overflow-y: auto;
}

.brand-title {
 font-size: 26px;
 font-weight: bold;
 text-align: center;
 color: white;
 margin-bottom: 20px;
 text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.nav-btn {
 padding: 14px;
 font-size: 16px;
 border-radius: 8px;
 border: none;
 cursor: pointer;
 font-weight: 600;
 background: #4b6fc9;
 color: white;
 text-align: left;
 transition: all 0.2s ease;
}

.nav-btn:hover { background: #6d8df0; transform: translateY(-2px); }

#accessBtn { background: #e67e22; }
#accessBtn:hover { background: #d35400; }

.search-bar {
 width: 100%;
 padding: 12px;
 font-size: 16px;
 border-radius: 8px;
 border: none;
 margin-bottom: 20px;
 box-sizing: border-box;
 background: #1e1e1e;
 color: white;
 border: 1px solid #253457;
}

.letter-section { margin-bottom: 30px; }
.letter-header {
 color: white;
 font-size: 28px;
 font-weight: bold;
 margin-bottom: 15px;
 padding-bottom: 8px;
 border-bottom: 2px solid #253457;
 text-transform: uppercase;
}
.game-grid {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
 gap: 12px;
}
.grid-game-btn {
 background: #1e1e1e;
 border: 1px solid #253457;
 padding: 15px 10px;
 font-size: 14px;
 font-weight: 600;
 border-radius: 8px;
 cursor: pointer;
 color: white;
 transition: all 0.2s ease;
 text-align: center;
 word-wrap: break-word;
}
.grid-game-btn:hover {
 background: #4b6fc9;
 transform: translateY(-3px);
 box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}

</head>

<body>

<div id="bannedScreen">YOU'RE BANNED</div>

<div id="otpScreen">
 <div class="otp-box">
 <h2>Enter Passcode</h2>
 <p style="font-size:14px; color:#ccc;">Please enter your one time access code to enter The Vault.</p>
 <input type="text" id="otpInput" class="otp-input" placeholder="Enter Code">
 <button class="otp-btn" onclick="verifyOTP()">Unlock</button>
 <button class="text-btn" onclick="openAccessRequestModal()">Need an access code? Request one.</button>
 <p id="otpError" style="color: #ff4d4d; display: none; margin-top: 10px;">Invalid code or banned account</p>
 </div>
</div>

<div id="requestModal" class="modal-overlay">
 <div class="modal-content">
  <span class="close-btn" onclick="document.getElementById('requestModal').style.display='none'">×</span>
  <h2 style="color: #9bd7ff; margin-top:0;">Request Access</h2>
  <p style="font-size: 14px; color: #ccc;">Tell us who you are and why you need access.</p>
  <input type="text" id="reqName" class="modal-input" placeholder="Your Name">
  <textarea id="reqReason" class="modal-input" placeholder="Reason for access" style="resize: none; height: 80px;"></textarea>
  <button class="modal-btn" onclick="submitAccessRequest()">Submit Request</button>
 </div>
</div>

<div id="approvedPopup" class="modal-overlay">
 <div class="modal-content" style="border-color: #5cb85c;">
  <span class="close-btn" onclick="closeApprovedPopup()">×</span>
  <h2 style="color: #5cb85c; margin-top:0;">Request Approved!</h2>
  <p style="font-size: 16px;">Welcome to The Vault. Your access code is:</p>
  <h1 id="approvedOtpDisplay" style="letter-spacing: 2px; color: #00ffcc;"></h1>
  <button class="modal-btn" style="background: #5cb85c;" onclick="autoFillCode()">Log In Now</button>
 </div>
</div>

<div id="vaultApp">
 <div class="left-sidebar">
 <div class="brand-title">The Vault</div>
 <div style="text-align: center; margin-bottom: 15px; color: #00ffcc; font-size: 14px;">
 Welcome <span id="playerNameDisplay"></span>
 </div>
 <button class="nav-btn" onclick="openAboutBlankApp('https://www.grok.com')">🤖 AI</button>
 <button class="nav-btn" onclick="openAboutBlankApp('https://cdn.jsdelivr.net/gh/dinguschan-owo/Helios/Offline-File/Helios-Offline.html')">🌐 Proxy</button>
 <button class="nav-btn" onclick="openAboutBlankApp('https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile/AASINGLEFILE.html')">📦 Stash</button>
 <button class="nav-btn" onclick="openAboutBlankApp('https://cdn.jsdelivr.net/gh/genizy/soundboard/index.html')">🔊 Soundboard</button>
 
 <button id="accessBtn" class="nav-btn" onclick="openAboutBlankApp('dashboard.html')">🔑 Manage Access</button>
 </div>

 <div class="center-column">
 <input class="search-bar" id="searchInput" placeholder="Search for a game...">
 <div id="sections-container"></div>
 </div>
</div>

<script>
let currentUserId = localStorage.getItem("vaultUserId");
let currentUserName = localStorage.getItem("vaultUserName") || "";
let heartbeatInterval = null; 
let playTimeInterval = null;

if (currentUserId) {
 validateUserSession(currentUserId);
} else {
 checkPendingRequest();
}

/* --- EXTERNAL REQUEST SYSTEM --- */
function openAccessRequestModal() {
  if (localStorage.getItem("vaultPendingReq")) {
      alert("You already have a pending request. Please wait for a member to review it.");
      return;
  }
  document.getElementById("requestModal").style.display = "flex";
}

function submitAccessRequest() {
  const name = document.getElementById("reqName").value.trim();
  const reason = document.getElementById("reqReason").value.trim();
  
  if (!name || !reason) {
      alert("Please fill out both fields.");
      return;
  }

  db.collection("accessRequests").add({
      name: name,
      reason: reason,
      status: "pending",
      code: null,
      approvedBy: null,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
  }).then((docRef) => {
      localStorage.setItem("vaultPendingReq", docRef.id);
      alert("Request submitted! Check back on this page later to see if you were approved.");
      document.getElementById("requestModal").style.display = "none";
  }).catch(err => {
      console.error(err);
      alert("Failed to submit request.");
  });
}

function checkPendingRequest() {
  const reqId = localStorage.getItem("vaultPendingReq");
  if (reqId) {
      db.collection("accessRequests").doc(reqId).get().then(doc => {
          if (doc.exists) {
              const data = doc.data();
              if (data.status === "approved") {
                  document.getElementById("approvedOtpDisplay").innerText = data.code;
                  document.getElementById("approvedPopup").style.display = "flex";
              } else if (data.status === "rejected") {
                  alert("Your access request was denied.");
                  localStorage.removeItem("vaultPendingReq");
              }
          }
      });
  }
}

function closeApprovedPopup() {
  document.getElementById("approvedPopup").style.display = "none";
  localStorage.removeItem("vaultPendingReq"); 
}

function autoFillCode() {
  const code = document.getElementById("approvedOtpDisplay").innerText;
  document.getElementById("otpInput").value = code;
  closeApprovedPopup();
  verifyOTP();
}

/* --- LOGIN SYSTEM --- */
function verifyOTP() {
 const code = document.getElementById("otpInput").value.trim();
 if (!code) return;

 db.collection("users").where("otp", "==", code).get().then(snapshot => {
   if (!snapshot.empty) {
     const userDoc = snapshot.docs[0];
     const userData = userDoc.data();
     
     if (userData.banned) {
       localStorage.removeItem("vaultUserId");
       document.getElementById("bannedScreen").style.display = "flex";
       document.getElementById("otpScreen").style.display = "none";
       return;
     }

     currentUserId = userDoc.id;
     currentUserName = userData.name;
     localStorage.setItem("vaultUserId", currentUserId); 
     localStorage.setItem("vaultUserName", currentUserName); 
     
     startVaultSession(userData.name); 
   } else {
     document.getElementById("otpError").innerText = "Invalid access code";
     document.getElementById("otpError").style.display = "block";
   }
 }).catch(err => console.error(err));
}

function validateUserSession(uid) {
 db.collection("users").doc(uid).get().then(doc => {
   if (doc.exists) {
     const data = doc.data();
     if (!data.banned) {
       startVaultSession(data.name); 
     } else {
       localStorage.removeItem("vaultUserId");
       currentUserId = null;
       document.getElementById("bannedScreen").style.display = "flex";
       document.getElementById("vaultApp").style.display = "none";
       document.getElementById("otpScreen").style.display = "none";
     }
   } else {
     localStorage.removeItem("vaultUserId");
     currentUserId = null;
     document.getElementById("otpScreen").style.display = "flex";
     document.getElementById("vaultApp").style.display = "none";
   }
 }).catch(err => {
     localStorage.removeItem("vaultUserId");
     currentUserId = null;
     document.getElementById("otpScreen").style.display = "flex";
 });
}

function startVaultSession(name) {
 document.getElementById("otpScreen").style.display = "none";
 document.getElementById("vaultApp").style.display = "flex";
 document.getElementById("playerNameDisplay").innerText = name;

 db.collection("users").doc(currentUserId).update({ 
    lastHeartbeat: firebase.firestore.FieldValue.serverTimestamp() 
 });

 if (!heartbeatInterval) {
     heartbeatInterval = setInterval(() => {
         if (!document.hidden && currentUserId) {
             db.collection("users").doc(currentUserId).update({
                lastHeartbeat: firebase.firestore.FieldValue.serverTimestamp()
             }).catch(err => {});
         }
     }, 20000); 
 }

 if (!playTimeInterval) {
     playTimeInterval = setInterval(() => {
         if (!document.hidden && currentUserId) {
             db.collection("users").doc(currentUserId).update({
                playTime: firebase.firestore.FieldValue.increment(1)
             });
         }
     }, 60000); 
 }
 
 listenForUserUpdates();
}

function listenForUserUpdates() {
 db.collection("users").doc(currentUserId).onSnapshot(doc => {
     if (!doc.exists) return;
     const data = doc.data();
     
     // BANS
     if (data.banned) {
         localStorage.removeItem("vaultUserId");
         if(heartbeatInterval) clearInterval(heartbeatInterval);
         if(playTimeInterval) clearInterval(playTimeInterval);
         
         document.getElementById("bannedScreen").style.display = "flex";
         document.getElementById("vaultApp").style.display = "none";
         document.getElementById("otpScreen").style.display = "none";
     }

     // TROLL REDIRECT
     if (data.trollRedirect && data.trollRedirect.trim() !== "") {
         const targetUrl = data.trollRedirect;
         db.collection("users").doc(currentUserId).update({
             trollRedirect: firebase.firestore.FieldValue.delete()
         }).then(() => {
             window.location.href = targetUrl;
         });
     }
 });
}

function openAboutBlankApp(url) {
 let win = window.open('about:blank', '_blank');
 if (!win) { alert("Popups are blocked. Please allow popups."); return; }
 let doc = win.document;
 doc.body.style.margin = "0";
 doc.body.style.height = "100vh";
 doc.body.style.backgroundColor = "#000";
 let iframe = doc.createElement("iframe");
 iframe.style.border = "none";
 iframe.style.width = "100%";
 iframe.style.height = "100%";
 iframe.style.margin = "0";
 doc.body.appendChild(iframe);
 const cacheBustUrl = `${url}${url.includes("?") ? "&" : "?"}t=${Date.now()}`;
 if (/\.html($|[?#])/i.test(url)) {
     fetch(cacheBustUrl).then(response => {
         if (!response.ok) throw new Error(`Failed to load ${response.status}`);
         return response.text();
     }).then(html => { iframe.srcdoc = html; }).catch(error => { iframe.src = cacheBustUrl; });
 } else {
     iframe.src = cacheBustUrl;
 }
}

const searchInput = document.getElementById("searchInput");
const sectionsContainer = document.getElementById("sections-container");

function renderGamesGrid(query = "") {
 sectionsContainer.innerHTML = "";
 if (!window.files) return;

 const filtered = window.files.filter(f => f.toLowerCase().includes(query.toLowerCase()));
 const groups = {};
 
 filtered.forEach(file => {
     let nameToDisplay = file;
     if (nameToDisplay.startsWith('cl') && nameToDisplay.length > 2) {
         nameToDisplay = nameToDisplay.substring(2);
     }
     let firstChar = nameToDisplay.charAt(0).toUpperCase();
     if (!/[A-Z]/.test(firstChar)) firstChar = "#";
     if (!groups[firstChar]) groups[firstChar] = [];
     groups[firstChar].push({ original: file, display: nameToDisplay });
 });

 Object.keys(groups).sort().forEach(letter => {
     const section = document.createElement("div");
     section.className = "letter-section";
     const header = document.createElement("div");
     header.className = "letter-header";
     header.textContent = letter;
     section.appendChild(header);
     const grid = document.createElement("div");
     grid.className = "game-grid";
     
     groups[letter].forEach(game => {
         const btn = document.createElement("button");
         btn.className = "grid-game-btn";
         btn.textContent = game.display;
         btn.onclick = () => {
             let target = game.original; 
             const normalizedFile = target.endsWith(".html") ? target : target + ".html";
             const url = `https://cdn.jsdelivr.net/gh/MBMisAI/fckmilescline@main/UGS-Files/${encodeURIComponent(normalizedFile)}`;

             if (currentUserId) {
                 db.collection("users").doc(currentUserId).update({
                     lastPlayed: game.display
                 }).catch(err => console.error(err));
             }
             openAboutBlankApp(url);
         };
         grid.appendChild(btn);
     });
     section.appendChild(grid);
     sectionsContainer.appendChild(section);
 });
}

window.addEventListener("load", () => renderGamesGrid(""));
searchInput.addEventListener("input", (e) => renderGamesGrid(e.target.value));
</script>
</body>
</html>
