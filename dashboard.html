<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vault Dashboard</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyCESmmIiAIo2E-42S-YPUhLJbsYv8Mmbf8",
 authDomain: "stronghold-tv.firebaseapp.com",
 projectId: "stronghold-tv",
 storageBucket: "stronghold-tv.firebasestorage.app",
 messagingSenderId: "863782282925",
 appId: "1:863782282925:web:384ff8188a88c21d50c824",
 measurementId: "G-M882FBJDLK"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// PRECAUTION: Pull logged-in admin's ID from local cache.
// Security rules require 'adminId' present in write requests.
const myAdminId = localStorage.getItem("vaultUserId");
if(!myAdminId) {
 alert("Warning: You are not logged in via vault.html. Security rules will likely block your changes.");
}
</script>

<style>
 body {
 background: #0d1117;
 color: white;
 font-family: Arial, sans-serif;
 margin: 0;
 padding: 20px;
 }
 .top-grid {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 20px;
 margin-bottom: 20px;
 }
 .card {
 background: #151b2d;
 border: 1px solid #253457;
 border-radius: 10px;
 padding: 20px;
 display: flex;
 flex-direction: column;
 }
 .card h2 {
 margin-top: 0;
 font-size: 18px;
 color: #9bd7ff;
 border-bottom: 1px solid #253457;
 padding-bottom: 10px;
 }
 input {
 padding: 10px;
 margin-bottom: 10px;
 border-radius: 6px;
 border: 1px solid #253457;
 background: #1e1e1e;
 color: white;
 width: 100%;
 box-sizing: border-box;
 }
 /* Style for checkbox label */
 .check-label {
 display: flex;
 align-items: center;
 gap: 8px;
 color: #ccc;
 margin-bottom: 10px;
 cursor: pointer;
 }
 .check-label input {
 width: auto; margin: 0;
 }

 button {
 padding: 10px;
 border-radius: 6px;
 border: none;
 background: #4b6fc9;
 color: white;
 font-weight: bold;
 cursor: pointer;
 }
 button:hover {
 background: #6d8df0;
 }
 .danger-btn { background: #d9534f; }
 .danger-btn:hover { background: #c9302c; }
 .success-btn { background: #5cb85c; }
 .success-btn:hover { background: #4cae4c; }
 
 ul { list-style: none; padding: 0; overflow-y: auto; max-height: 150px; }
 li {
 background: #1e1e1e;
 padding: 10px;
 margin-bottom: 8px;
 border-radius: 6px;
 display: flex;
 justify-content: space-between;
 align-items: center;
 }
 
 table {
 width: 100%;
 border-collapse: collapse;
 margin-top: 10px;
 }
 th, td {
 padding: 12px;
 text-align: left;
 border-bottom: 1px solid #253457;
 }
 th { color: #9bd7ff; }
</style>
</head>
<body>

<div class="top-grid">
 <div class="card">
 <h2>Generate New Member OTP</h2>
 <input type="text" id="memberName" placeholder="Member Name">
 <label class="check-label">
 <input type="checkbox" id="memberIsMod"> Make Moderator
 </label>
 
 <button onclick="generateMember()">Create Access Code</button>
 <p id="newOtpDisplay" style="color: #00ffcc; font-weight: bold; text-align: center; margin-top: 15px;"></p>
 </div>

 <div class="card">
 <h2>Announcements</h2>
 <div style="display: flex; gap: 10px;">
 <input type="text" id="announcementText" placeholder="New announcement...">
 <button onclick="addAnnouncement()">Add</button>
 </div>
 <ul id="announcementList"></ul>
 </div>

 <div class="card" style="align-items: center; justify-content: center; text-align: center;">
 <h2>Killswitch</h2>
 <p>Current Status: <strong id="siteStatusText">Loading...</strong></p>
 <button id="killswitchBtn" onclick="toggleKillswitch()" style="width: 100%; padding: 15px; font-size: 16px;">Toggle Site Access</button>
 </div>
</div>

<div class="card">
 <h2>Member List</h2>
 <table>
 <thead>
 <tr>
 <th>Name</th>
 <th>Code</th>
 <th>Status</th> <th>Role</th> <th>Play Time</th>
 <th>Ban Control</th>
 <th>Remove</th>
 </tr>
 </thead>
 <tbody id="memberTableBody">
 </tbody>
 </table>
</div>

<script>
// Presence config: If no heartbeat in 60 seconds, user is offline.
// This threshold accounts for network lag and interval drift on vault.html (20s).
const ONLINE_THRESHOLD_MS = 60000; 

function generateRandomOTP() {
 return Math.random().toString(36).substring(2, 8).toUpperCase();
}

function generateMember() {
 const name = document.getElementById("memberName").value.trim();
 const isMod = document.getElementById("memberIsMod").checked; // Read Mod checkbox
 
 // REMOVED EMAIL VALIDATION
 if (!name) return alert("Please enter a name");

 const otp = generateRandomOTP();
 
 db.collection("users").add({
 name: name,
 // REMOVED EMAIL
 otp: otp,
 lastHeartbeat: null, // Initial presence state
 playTime: 0,
 banned: false,
 isMod: isMod, // Set Mod status
 adminId: myAdminId // Identity proof for security rules
 }).then(() => {
 document.getElementById("newOtpDisplay").innerText = "Generated Code: " + otp;
 document.getElementById("memberName").value = "";
 document.getElementById("memberIsMod").checked = false; // Reset checkbox
 }).catch(err => alert("Failed to create user. Likely permission denied."));
}

db.collection("config").doc("site").onSnapshot((doc) => {
 const data = doc.data();
 if (!data) return;
 
 const statusText = document.getElementById("siteStatusText");
 const btn = document.getElementById("killswitchBtn");
 if (data.STATUS !== false) {
 statusText.innerText = "ONLINE";
 statusText.style.color = "#5cb85c";
 btn.className = "danger-btn";
 btn.innerText = "Disable Site (Killswitch)";
 } else {
 statusText.innerText = "OFFLINE";
 statusText.style.color = "#d9534f";
 btn.className = "success-btn";
 btn.innerText = "Enable Site";
 }

 const list = document.getElementById("announcementList");
 list.innerHTML = "";
 const announcements = data.announcements || [];
 announcements.forEach((text, index) => {
 const li = document.createElement("li");
 li.innerText = text;
 const removeBtn = document.createElement("button");
 removeBtn.innerText = "X";
 removeBtn.className = "danger-btn";
 removeBtn.style.padding = "5px 10px";
 removeBtn.onclick = () => removeAnnouncement(index, announcements);
 li.appendChild(removeBtn);
 list.appendChild(li);
 });
});

function toggleKillswitch() {
 const docRef = db.collection("config").doc("site");
 docRef.get().then(doc => {
 if (doc.exists) {
 docRef.update({ 
 STATUS: !doc.data().STATUS,
 adminId: myAdminId // Identity proof
 });
 }
 });
}

function addAnnouncement() {
 const input = document.getElementById("announcementText");
 const text = input.value.trim();
 if (!text) return;
 db.collection("config").doc("site").update({
 announcements: firebase.firestore.FieldValue.arrayUnion(text),
 adminId: myAdminId // Identity proof
 }).then(() => input.value = "");
}

function removeAnnouncement(index, currentArray) {
 currentArray.splice(index, 1);
 db.collection("config").doc("site").update({ 
 announcements: currentArray,
 adminId: myAdminId // Identity proof
 });
}

// Presence logic needs constant updating in the table
let usersDataCache = []; // Store data to allow re-rendering presence colors
setInterval(renderMemberListPresence, 10000); // Update table presence colors every 10s

db.collection("users").onSnapshot((snapshot) => {
 usersDataCache = snapshot; // Update cache
 renderMemberListPresence(); // Initial render
});

function renderMemberListPresence() {
 const tbody = document.getElementById("memberTableBody");
 tbody.innerHTML = "";
 
 if (!usersDataCache || usersDataCache.empty) {
 tbody.innerHTML = "<tr><td colspan='7' style='text-align:center;'>No members found</td></tr>";
 return;
 }

 // Get current server time for comparison
 const now = firebase.firestore.Timestamp.now().toMillis();

 usersDataCache.forEach(doc => {
 const user = doc.data();
 const tr = document.createElement("tr");
 
 // --- PRESENCE CALCULATION ---
 let isOnline = false;
 let statusText = "Offline";
 let statusColor = "#888"; // Grey

 if (user.lastHeartbeat) {
 const heartbeatMs = user.lastHeartbeat.toMillis();
 const diff = now - heartbeatMs;
 
 if (diff < ONLINE_THRESHOLD_MS) {
 isOnline = true;
 statusText = "Online";
 statusColor = "#5cb85c"; // Green
 }
 }

 tr.innerHTML = `
 <td>${user.name || "Unknown"}</td>
 <td><b style="color:#00ffcc">${user.otp}</b></td>
 <td style="color:${statusColor}">${statusText}</td> 
 <td style="color:${user.isMod ? '#33a8ff' : '#ccc'}">${user.isMod ? "Mod" : "Member"}</td>
 <td>${user.playTime || 0} min</td>
 <td>
 <button class="${user.banned ? 'success-btn' : 'danger-btn'}" 
 onclick="toggleBan('${doc.id}', ${user.banned})">
 ${user.banned ? "Unban" : "Ban"}
 </button>
 </td>
 <td>
 <button class="danger-btn" onclick="deleteUser('${doc.id}')">Delete</button>
 </td>
 `;
 tbody.appendChild(tr);
 });
}

function toggleBan(userId, currentStatus) {
 db.collection("users").doc(userId).update({ 
 banned: !currentStatus,
 adminId: myAdminId // Identity proof
 });
}

function deleteUser(userId) {
 if(confirm("Are you sure you want to delete this member?")) {
 db.collection("users").doc(userId).delete({
 adminId: myAdminId // Identity proof
 });
 }
}
</script>
</body>
</html>
