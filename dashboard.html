<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Access Management</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
 apiKey: "AIzaSyCESmmIiAIo2E-42S-YPUhLJbsYv8Mmbf8",
 authDomain: "stronghold-tv.firebaseapp.com",
 projectId: "stronghold-tv",
 storageBucket: "stronghold-tv.firebasestorage.app",
 messagingSenderId: "863782282925",
 appId: "1:863782282925:web:384ff8188a88c21d50c824",
 measurementId: "G-M882FBJDLK"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Pull logged-in user info to log WHO is giving out the codes
const myUserId = localStorage.getItem("vaultUserId");
const myUserName = localStorage.getItem("vaultUserName") || "Unknown Member";

if(!myUserId) {
 alert("Warning: You are not logged in via The Vault.");
}
</script>

<style>
 body {
 background: #0d1117;
 color: white;
 font-family: Arial, sans-serif;
 margin: 0;
 padding: 20px;
 }
 .top-grid {
 display: grid;
 grid-template-columns: repeat(2, 1fr);
 gap: 20px;
 margin-bottom: 20px;
 }
 .card {
 background: #151b2d;
 border: 1px solid #253457;
 border-radius: 10px;
 padding: 20px;
 display: flex;
 flex-direction: column;
 }
 .card h2 {
 margin-top: 0;
 font-size: 18px;
 color: #9bd7ff;
 border-bottom: 1px solid #253457;
 padding-bottom: 10px;
 }

 button {
 padding: 10px;
 border-radius: 6px;
 border: none;
 background: #4b6fc9;
 color: white;
 font-weight: bold;
 cursor: pointer;
 }
 button:hover { background: #6d8df0; }
 .danger-btn { background: #d9534f; }
 .danger-btn:hover { background: #c9302c; }
 .success-btn { background: #5cb85c; }
 .success-btn:hover { background: #4cae4c; }
 .troll-btn { background: #8e44ad; }
 .troll-btn:hover { background: #9b59b6; }
 
 ul { list-style: none; padding: 0; overflow-y: auto; max-height: 300px; margin: 0; }
 li {
 background: #1e1e1e;
 padding: 15px;
 margin-bottom: 8px;
 border-radius: 6px;
 display: flex;
 justify-content: space-between;
 align-items: center;
 border-left: 4px solid #4b6fc9;
 }
 
 table {
 width: 100%;
 border-collapse: collapse;
 margin-top: 10px;
 }
 th, td {
 padding: 12px;
 text-align: left;
 border-bottom: 1px solid #253457;
 }
 th { color: #9bd7ff; }
</style>
</head>
<body>

<div class="top-grid">
 <div class="card">
 <h2>Pending Code Requests</h2>
 <ul id="pendingList">
    <li style="justify-content: center; color: #888; border: none;">Loading requests...</li>
 </ul>
 </div>

 <div class="card">
 <h2>Code Generation Log</h2>
 <ul id="logList">
    <li style="justify-content: center; color: #888; border: none;">Loading logs...</li>
 </ul>
 </div>
</div>

<div class="card">
 <h2>Active Members</h2>
 <table>
 <thead>
 <tr>
 <th>Name</th>
 <th>Status</th> 
 <th>Approved By</th> 
 <th>Play Time</th>
 <th>Last Played</th>
 <th>Actions (Troll)</th>
 </tr>
 </thead>
 <tbody id="memberTableBody">
 </tbody>
 </table>
</div>

<script>
const ONLINE_THRESHOLD_MS = 60000; 

function generateRandomOTP() {
 return Math.random().toString(36).substring(2, 8).toUpperCase();
}

/* --- LISTEN FOR PENDING REQUESTS --- */
db.collection("accessRequests").where("status", "==", "pending").onSnapshot(snap => {
    const list = document.getElementById("pendingList");
    list.innerHTML = "";
    
    if(snap.empty) {
        list.innerHTML = `<li style="justify-content: center; color: #888; border: none;">No pending requests right now.</li>`;
        return;
    }

    snap.forEach(doc => {
        const req = doc.data();
        list.innerHTML += `
        <li style="border-left-color: #e67e22;">
            <div>
                <b style="color:#fff; font-size: 18px;">${req.name}</b><br>
                <i style="color:#ccc; font-size: 14px;">"${req.reason}"</i>
            </div>
            <div style="display:flex; gap:8px;">
                <button class="success-btn" onclick="approveRequest('${doc.id}', '${req.name}')">Approve & Give Code</button>
                <button class="danger-btn" onclick="rejectRequest('${doc.id}')">Deny</button>
            </div>
        </li>`;
    });
});

/* --- LISTEN FOR APPROVED LOGS --- */
db.collection("accessRequests").where("status", "==", "approved").orderBy("timestamp", "desc").limit(10).onSnapshot(snap => {
    const list = document.getElementById("logList");
    list.innerHTML = "";
    
    if(snap.empty) {
        list.innerHTML = `<li style="justify-content: center; color: #888; border: none;">No codes given out yet.</li>`;
        return;
    }

    snap.forEach(doc => {
        const req = doc.data();
        list.innerHTML += `
        <li style="border-left-color: #5cb85c;">
            <div>
                <b style="color:#fff;">${req.name}</b> was given code <b style="color:#00ffcc;">${req.code}</b>
                <br>
                <small style="color:#aaa;">Approved by: ${req.approvedBy}</small>
            </div>
        </li>`;
    });
});

function approveRequest(reqId, requestedName) {
    const otp = generateRandomOTP();
    
    // 1. Create the new user account
    db.collection("users").add({
        name: requestedName,
        otp: otp,
        lastHeartbeat: null,
        playTime: 0,
        banned: false,
        approvedBy: myUserName
    }).then(() => {
        // 2. Mark the request as approved so the code pops up for them
        db.collection("accessRequests").doc(reqId).update({
            status: "approved",
            code: otp,
            approvedBy: myUserName
        });
    }).catch(err => alert("Error approving request."));
}

function rejectRequest(reqId) {
    if(confirm("Are you sure you want to deny this request?")) {
        db.collection("accessRequests").doc(reqId).update({
            status: "rejected",
            approvedBy: myUserName
        });
    }
}

/* --- MEMBER LIST & TROLL FEATURE --- */
let usersDataCache = []; 
setInterval(renderMemberList, 10000); 

db.collection("users").onSnapshot((snapshot) => {
 usersDataCache = snapshot; 
 renderMemberList(); 
});

function renderMemberList() {
 const tbody = document.getElementById("memberTableBody");
 tbody.innerHTML = "";
 
 if (!usersDataCache || usersDataCache.empty) {
    tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>No members found</td></tr>";
    return;
 }

 const now = firebase.firestore.Timestamp.now().toMillis();

 usersDataCache.forEach(doc => {
    const user = doc.data();
    const tr = document.createElement("tr");
    
    let isOnline = false;
    let statusText = "Offline";
    let statusColor = "#888"; 

    if (user.lastHeartbeat) {
        const heartbeatMs = user.lastHeartbeat.toMillis();
        const diff = now - heartbeatMs;
        
        if (diff < ONLINE_THRESHOLD_MS) {
            isOnline = true;
            statusText = "Online";
            statusColor = "#5cb85c"; 
        }
    }

    tr.innerHTML = `
    <td><b>${user.name || "Unknown"}</b></td>
    <td style="color:${statusColor}">${statusText}</td> 
    <td style="color:#aaa">${user.approvedBy || "Unknown"}</td>
    <td>${user.playTime || 0} min</td>
    <td>${user.lastPlayed || "None"}</td>
    <td style="display:flex; gap: 5px;">
        <button class="troll-btn" onclick="trollUser('${doc.id}')">Troll Redirect</button>
        <button class="${user.banned ? 'success-btn' : 'danger-btn'}" onclick="toggleBan('${doc.id}', ${user.banned})">
            ${user.banned ? "Unban" : "Ban"}
        </button>
    </td>
    `;
    tbody.appendChild(tr);
 });
}

function trollUser(userId) {
    const url = prompt("Enter a URL to force-redirect this user (e.g., https://cat-bounce.com):");
    if (url && url.trim() !== "") {
        db.collection("users").doc(userId).update({
            trollRedirect: url.trim()
        }).then(() => {
            alert("Troll redirect sent! If they are online, their screen will flip instantly.");
        });
    }
}

function toggleBan(userId, currentStatus) {
 db.collection("users").doc(userId).update({ 
    banned: !currentStatus
 });
}
</script>
</body>
</html>
